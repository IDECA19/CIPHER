<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CipherChat - Mensajería P2P cifrada">
    <title>CipherChat</title>
    
    <!-- PeerJS para WebRTC P2P (se carga aquí, no necesita importmap) -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    
    <!-- Estilos -->
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/chat_list.css">
    <link rel="stylesheet" href="css/chat_window.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/contacts_modal.css">
</head>
<body>
    <!-- Pantalla de carga inicial -->
    <div id="splash-screen" class="splash">
        <div class="splash__logo">🔐</div>
        <div class="splash__title">CipherChat</div>
        <div class="splash__status" id="splash-status">Inicializando...</div>
    </div>

    <!-- Aplicación principal -->
    <div id="app" class="app hidden">
        <!-- Panel izquierdo: lista de chats -->
        <aside class="sidebar">
            <header class="sidebar__header">
                <div class="user-info">
                    <div class="user-info__pin" id="my-pin">Cargando...</div>
                    <div class="user-info__status">En línea</div>
                </div>
                <div class="sidebar__actions">
                    <button class="icon-btn" id="btn-new-chat" title="Nuevo chat">💬</button>
                    <button class="icon-btn" id="btn-contacts" title="Contactos">👥</button>
                    <button class="icon-btn" id="btn-settings" title="Ajustes">⚙️</button>
                </div>
            </header>
            
            <div class="search-box">
                <input type="text" id="search-chats" placeholder="Buscar chats...">
            </div>
            
            <div class="chat-list" id="chat-list">
                <div class="empty-state" id="empty-chats">
                    <div class="empty-state__icon">💬</div>
                    <div class="empty-state__title">Sin chats aún</div>
                    <div class="empty-state__text">Comparte tu PIN para empezar</div>
                </div>
            </div>
        </aside>

        <!-- Panel derecho: ventana de conversación -->
        <main class="chat-area">
            <div class="chat-area__empty" id="chat-empty">
                <div class="chat-area__logo">🔐</div>
                <h2>CipherChat</h2>
                <p>Mensajería P2P cifrada de extremo a extremo</p>
                <div class="my-pin-display">
                    <span>Tu PIN:</span>
                    <code id="my-pin-display">---</code>
                    <button class="btn-copy" id="btn-copy-pin">📋 Copiar</button>
                </div>
            </div>
            
            <div class="chat-window hidden" id="chat-window">
                <header class="chat-window__header">
                    <button class="btn-back" id="btn-back" title="Volver a chats">←</button>
                    <div class="chat-window__info">
                        <div class="chat-window__name" id="chat-name">---</div>
                        <div class="chat-window__pin" id="chat-pin">---</div>
                    </div>
                </header>
                
                <div class="chat-window__messages" id="chat-messages"></div>
                
                <footer class="chat-window__input">
                    <button class="attach-btn" id="btn-attach" title="Adjuntar archivo">📎</button>
                    <textarea id="message-input" placeholder="Escribe un mensaje..." rows="1"></textarea>
                    <button class="send-btn" id="btn-send">➤</button>
                </footer>
            </div>
        </main>
    </div>

    <!-- Input oculto para seleccionar archivos -->
    <input type="file" id="file-input" style="display: none;" multiple>

    <!-- Overlay de progreso de archivo -->
    <div class="file-progress-overlay hidden" id="file-progress-overlay">
        <div class="file-progress-box">
            <div class="file-progress-icon">📎</div>
            <div class="file-progress-name" id="file-progress-name">Enviando archivo...</div>
            <div class="file-progress-bar">
                <div class="file-progress-fill" id="file-progress-fill"></div>
            </div>
            <div class="file-progress-percent" id="file-progress-percent">0%</div>
        </div>
    </div>

    <!-- Contenedor de notificaciones -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Scripts de la aplicación -->
    <script type="module" src="js/config.js"></script>
    <script type="module" src="js/utils/formatter.js"></script>
    <script type="module" src="js/core/crypto.js"></script>
    <script type="module" src="js/core/identity.js"></script>
    <script type="module" src="js/core/storage.js"></script>
    <script type="module" src="js/services/contacts.js"></script>
    <script type="module" src="js/services/files.js"></script>
    <script type="module" src="js/services/messaging.js"></script>
    <script type="module" src="js/network/p2p.js"></script>
    <script type="module" src="js/ui/chat_list.js"></script>
    <script type="module" src="js/ui/chat_window.js"></script>
    <script type="module" src="js/ui/contacts_modal.js"></script>
    <script type="module" src="js/main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CipherChat - Mensajería P2P cifrada de extremo a extremo">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔐</text></svg>">
    
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/chat_list.css">
    <link rel="stylesheet" href="css/chat_window.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/contacts_modal.css">
</head>
<body>
    <div id="splash-screen" class="splash">
        <div class="splash__logo">🔐</div>
        <div class="splash__title">CipherChat</div>
        <div class="splash__status" id="splash-status">Inicializando...</div>
    </div>

    <div id="app" class="app hidden">
        <aside class="sidebar">
            <header class="sidebar__header">
                <div class="user-info">
                    <div class="user-info__pin" id="my-pin">Cargando...</div>
                    <div class="user-info__status">En línea</div>
                </div>
                <div class="sidebar__actions">
                    <button class="icon-btn" id="btn-new-chat" title="Nuevo chat">💬</button>
                    <button class="icon-btn" id="btn-contacts" title="Contactos">👥</button>
                    <button class="icon-btn" id="btn-settings" title="Ajustes">⚙️</button>
                </div>
            </header>
            
            <div class="search-box">
                <input type="text" id="search-chats" placeholder="Buscar chats...">
            </div>
            
            <div class="chat-list" id="chat-list">
                <div class="empty-state" id="empty-chats">
                    <div class="empty-state__icon">💬</div>
                    <div class="empty-state__title">Sin chats aún</div>
                    <div class="empty-state__text">Comparte tu PIN para empezar</div>
                </div>
            </div>
        </aside>

        <main class="chat-area">
            <div class="chat-area__empty" id="chat-empty">
                <div class="chat-area__logo">🔐</div>
                <h2>CipherChat</h2>
                <p>Mensajería P2P cifrada de extremo a extremo</p>
                <div class="my-pin-display">
                    <span>Tu PIN:</span>
                    <code id="my-pin-display">---</code>
                    <button class="btn-copy" id="btn-copy-pin">📋 Copiar</button>
                </div>
            </div>
            
            <div class="chat-window hidden" id="chat-window">
                <header class="chat-window__header">
                    <div class="chat-window__info">
                        <div class="chat-window__name" id="chat-name">---</div>
                        <div class="chat-window__pin" id="chat-pin">---</div>
                    </div>
                </header>
                
                <div class="chat-window__messages" id="chat-messages">
                    </div>
                
                <footer class="chat-window__input">
                    <textarea id="message-input" placeholder="Escribe un mensaje..." rows="1"></textarea>
                    <button class="send-btn" id="btn-send">➤</button>
                </footer>
            </div>
        </main>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
